<head>

    <!-- Structured Data (JSON-LD) -->

      "name": "Across America Mortgage Company",

      "address": {

        "addressLocality": "Houston",
        "addressRegion": "TX",
        "postalCode": "77036",

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001736",
                        "secondary": "#bb0027",
                        "background": "#f9f9fc",
                        "on-background": "#1a1c1e",
                        "outline-variant": "#c4c6d0",
                        "on-surface-variant": "#43474f",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            min-height: 100dvh;
        }
    </style>
</head>

<body class="bg-background text-on-background font-sans min-h-screen flex flex-col">
    <header
        class="fixed top-0 left-0 w-full z-50 bg-white border-b border-slate-200 flex justify-between items-center px-4 h-16">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-blue-900">home</span>
            <h1 class="text-lg font-black tracking-widest text-blue-900 uppercase">Across America Mortgage</h1>
        </div>
    </header>

    <main class="flex-grow pt-16 pb-20">
        <section class="relative h-[320px] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img class="w-full h-full object-cover" src="bg-image.jpeg" alt="Luxury Home">
                <div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/40 to-transparent"></div>
            </div>
            <div class="relative z-10 p-6 flex flex-col items-center">
                <span class="material-symbols-outlined text-white text-8xl">home</span>
            </div>
        </section>

        <section class="p-6 -mt-24 relative z-20">
            <div class="bg-white rounded-lg shadow-sm border border-outline-variant p-8 max-w-2xl mx-auto">
                <div id="formContainer">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-1 h-8 bg-secondary rounded-full"></div>
                        <h3 class="text-2xl font-bold text-primary">Pre-Approval Request</h3>
                    </div>

                    <form id="leadForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-on-surface-variant mb-2">Full Name</label>
                            <div class="relative">
                                <span
                                    class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">person</span>
                                <input name="fullName"
                                    class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none transition-all"
                                    placeholder="John Doe" type="text" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-on-surface-variant mb-2">Property Price
                                    (USD)</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
                                    <input name="propertyPrice"
                                        class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none transition-all"
                                        placeholder="500,000" type="number" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-on-surface-variant mb-2">Target US
                                    State</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">map</span>
                                    <select name="targetState"
                                        class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none bg-white appearance-none transition-all"
                                        required>
                                        <option disabled selected value="">Select State</option>
                                        <option value="ALABAMA">ALABAMA</option>
                                        <option value="ALASKA">ALASKA</option>
                                        <option value="ARIZONA">ARIZONA</option>
                                        <option value="CALIFORNIA">CALIFORNIA</option>
                                        <option value="COLORADO">COLORADO</option>
                                        <option value="CONNECTICUT">CONNECTICUT</option>
                                        <option value="DELAWARE">DELAWARE</option>
                                        <option value="DISTRICT OF COLUMBIA">
                                            DISTRICT OF COLUMBIA
                                        </option>
                                        <option value="FLORIDA">FLORIDA</option>
                                        <option value="GEORGIA">GEORGIA</option>
                                        <option value="HAWAII">HAWAII</option>
                                        <option value="IDAHO">IDAHO</option>
                                        <option value="ILLINOIS">ILLINOIS</option>
                                        <option value="INDIANA">INDIANA</option>
                                        <option value="IOWA">IOWA</option>
                                        <option value="KANSAS">KANSAS</option>
                                        <option value="KENTUCKY">KENTUCKY</option>
                                        <option value="LOUISIANA">LOUISIANA</option>
                                        <option value="MAINE">MAINE</option>
                                        <option value="MARYLAND">MARYLAND</option>
                                        <option value="MASSACHUSETTS">MASSACHUSETTS</option>
                                        <option value="MICHIGAN">MICHIGAN</option>
                                        <option value="MINNESOTA">MINNESOTA</option>
                                        <option value="MISSISSIPPI">MISSISSIPPI</option>
                                        <option value="MISSOURI">MISSOURI</option>
                                        <option value="MONTANA">MONTANA</option>
                                        <option value="NEBRASKA">NEBRASKA</option>
                                        <option value="NEVADA">NEVADA</option>
                                        <option value="NEW HAMPSHIRE">NEW HAMPSHIRE</option>
                                        <option value="NEW JERSEY">NEW JERSEY</option>
                                        <option value="NEW MEXICO">NEW MEXICO</option>
                                        <option value="NEW YORK">NEW YORK</option>
                                        <option value="NORTH CAROLINA">NORTH CAROLINA</option>
                                        <option value="NORTH DAKOTA">NORTH DAKOTA</option>
                                        <option value="OHIO">OHIO</option>
                                        <option value="OKLAHOMA">OKLAHOMA</option>
                                        <option value="OREGON">OREGON</option>
                                        <option value="PENNSYLVANIA">PENNSYLVANIA</option>
                                        <option value="RHODE ISLAND">RHODE ISLAND</option>
                                        <option value="SOUTH CAROLINA">SOUTH CAROLINA</option>
                                        <option value="SOUTH DAKOTA">SOUTH DAKOTA</option>
                                        <option value="TENNESSEE">TENNESSEE</option>
                                        <option value="TEXAS">TEXAS</option>
                                        <option value="UTAH">UTAH</option>
                                        <option value="VERMONT">VERMONT</option>
                                        <option value="VIRGINIA">VIRGINIA</option>
                                        <option value="WASHINGTON">WASHINGTON</option>
                                        <option value="WEST VIRGINIA">WEST VIRGINIA</option>
                                        <option value="WISCONSIN">WISCONSIN</option>
                                        <option value="WYOMING">WYOMING</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-on-surface-variant mb-2">Contact
                                    Number</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">call</span>
                                    <input name="contactNumber"
                                        class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none transition-all"
                                        placeholder="+1 (555) 000-0000" type="tel" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-on-surface-variant mb-2">Email
                                    Address</label>
                                <div class="relative">
                                    <span
                                        class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">mail</span>
                                    <input name="email"
                                        class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none transition-all"
                                        placeholder="email@example.com" type="email" required>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-on-surface-variant mb-2">Country of
                                Residence</label>
                            <div class="relative">
                                <span
                                    class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">public</span>
                                <select name="country"
                                    class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg outline-none bg-white appearance-none transition-all"
                                    required>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="PK">Pakistan</option>
                                    <option value="IN">India</option>
                                    <option value="OT">Other</option>
                                    <!-- <option value="US">United States</option> -->
                                </select>
                            </div>
                        </div>

                        <button id="submitBtn"
                            class="w-full mt-8 bg-secondary text-white font-bold uppercase tracking-widest py-4 rounded-lg hover:opacity-90 transition-all flex justify-center items-center gap-2"
                            type="submit">
                            Get Approved Today!
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>

                        <div id="responseMsg" class="hidden text-center text-sm font-medium mt-4"></div>
                    </form>
                </div>

                <div id="successState" class="hidden text-center py-12">
                    <span class="material-symbols-outlined text-green-500 text-7xl mb-6">check_circle</span>
                    <h3 class="text-3xl font-bold text-primary mb-4">Thank You.</h3>
                    <p class="text-on-surface-variant text-lg leading-relaxed max-w-md mx-auto">
                        Your loan inquiry has been received. Our team will review your details and reach out to you as
                        soon as
                        possible.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById('leadForm');
        const formContainer = document.getElementById('formContainer');
        const successState = document.getElementById('successState');
        const submitBtn = document.getElementById('submitBtn');
        const responseMsg = document.getElementById('responseMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span> Sending...';
            responseMsg.classList.add('hidden');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    formContainer.classList.add('hidden');
                    successState.classList.remove('hidden');
                    form.reset();
                } else {
                    responseMsg.textContent = result.error || 'Something went wrong. Please try again.';
                    responseMsg.className = 'text-center text-sm font-medium mt-4 text-red-600';
                    responseMsg.classList.remove('hidden');
                }
            } catch (error) {
                responseMsg.textContent = 'Network error. Please check your connection.';
                responseMsg.className = 'text-center text-sm font-medium mt-4 text-red-600';
                responseMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Get Approved Today! <span class="material-symbols-outlined">arrow_forward</span>';
            }
        });
    </script>
</body>

</html>
