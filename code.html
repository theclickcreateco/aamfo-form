            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-white border-b border-slate-200 flex justify-between items-center px-4 h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-blue-900" data-icon="menu">menu</span>
<h1 class="text-lg font-black tracking-widest text-blue-900 uppercase">Across America Mortgage</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-900" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="flex-grow pt-16 pb-20">
<!-- Hero Section -->
<section class="relative h-[320px] flex items-end overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A high-end, contemporary American luxury home with large glass windows and manicured lawns, set against a clear blue sky. The lighting is bright and architectural, emphasizing the reliability and authority of the brand. The color palette features deep navy and white tones, creating a professional and trustworthy atmosphere for financial services. The overall mood is aspirational and modern, reflecting the dream of US property ownership." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdTkzwFpQkLeZGllBwrHiSsFVax8XRA6mZ9LYLAJsmy6ObuG7hw7rg-lICkjphukO4XZKkdB6zW-gLS-3CvAIlklBuy8HN6uhm0NTpynwl-aNhoVjQ5k5J8WnLGz-GHQMew5PmwHlJUAvkRbHuUJL1eVfjGVmXQHQkLMO-SFbGDmwhJbRUcm9fn4wWGFkBRg5EtxSGAqUPJLevaE19a7090Z_4U59uxNzpGdlm2dcc9NrXB4xjzq8qgWTPGGggkMViS_TWVh0R1KE">
<div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/40 to-transparent"></div>
</div>
<div class="relative z-10 p-gutter w-full">
<h2 class="font-headline-lg text-headline-lg text-white mb-stack-sm">OWN YOUR DREAM HOME IN THE USA</h2>
<p class="font-body-md text-body-md text-white/90">Fast. Simple. Reliable financing for Canadians.</p>
</div>
</section>
<!-- Form Section -->
<section class="p-gutter -mt-8 relative z-20">
<div class="bg-white rounded-lg shadow-sm border border-outline-variant p-stack-lg">
<div class="flex items-center gap-stack-sm mb-stack-lg">
<div class="w-1 h-8 bg-secondary rounded-full"></div>
<h3 class="font-headline-md text-headline-md text-primary">Pre-Approval Request</h3>
</div>
<form class="space-y-stack-md" action="/api/submit-form" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Full Name</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none transition-all" placeholder="John Doe" type="text">
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Property Price -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Property Price (USD)</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none transition-all" placeholder="500,000" type="number">
</div>
</div>
<!-- Target State -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Target US State</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="map">map</span>
<select class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none bg-white appearance-none transition-all">
<option value="">Select State</option>
<option value="FL">Florida</option>
<option value="AZ">Arizona</option>
<option value="CA">California</option>
<option value="TX">Texas</option>
<option value="NY">New York</option>
</select>
<span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Contact Info Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Phone -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Contact Number</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="call">call</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none transition-all" placeholder="+1 (555) 000-0000" type="tel">
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Email Address</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none transition-all" placeholder="email@example.com" type="email">
</div>
</div>
</div>
<!-- Country -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-stack-sm">Country of Residence</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="public">public</span>
<select class="w-full pl-10 pr-4 py-3 border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg font-body-md outline-none bg-white appearance-none transition-all">
<option value="CA">Canada</option>
<option value="US">United States</option>
<option value="UK">United Kingdom</option>
</select>
<span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- CTA -->
<button class="w-full mt-stack-lg bg-secondary text-white font-label-lg uppercase tracking-widest py-4 rounded-lg hover:bg-on-secondary-fixed-variant transition-all flex justify-center items-center gap-2" type="submit">
                        Get Approved Today!
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant mt-stack-md">
<span class="material-symbols-outlined text-sm align-middle" data-icon="lock" style="font-size: 14px;">lock</span>
                        Your data is secured with institutional-grade encryption.
                    </p>
</form>
</div>

</section>
</main>



</body></html>
